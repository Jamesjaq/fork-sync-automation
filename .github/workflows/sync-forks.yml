name: Sync All Forks

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  sync-forks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh
      
      - name: Sync all forks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching all forked repositories..."
          FORKS=$(gh repo list ${{ github.repository_owner }} --fork --json nameWithOwner -q '.[].nameWithOwner')
          
          TOTAL=$(echo "$FORKS" | wc -l)
          SYNCED=0
          FAILED=0
          
          echo "Found $TOTAL forked repositories"
          echo "---"
          
          for FORK in $FORKS; do
            echo "Syncing $FORK..."
            if gh repo sync "$FORK" --force 2>/dev/null; then
              echo "✓ Successfully synced $FORK"
              ((SYNCED++))
            else
              echo "✗ Failed to sync $FORK"
              ((FAILED++))
            fi
          done
          
          echo "---"
          echo "Sync Summary:"
          echo "✓ Synced: $SYNCED"
          echo "✗ Failed: $FAILED"
          echo "Total: $TOTAL"
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-logs
          path: sync-*.log
          retention-days: 7
